<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetroSync</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #111; color: #e0e0e0; padding: 1.5rem; }
  h1 { font-size: 1.4rem; color: #7ec8e3; margin-bottom: 1.5rem; letter-spacing: 0.05em; }
  h2 { font-size: 1rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
  .panel { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .kv { display: grid; grid-template-columns: max-content 1fr; gap: 0.3rem 1rem; font-size: 0.9rem; }
  .kv .label { color: #888; }
  .kv .value { color: #e0e0e0; font-family: monospace; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { text-align: left; color: #888; font-weight: normal; padding: 0.3rem 0.5rem; border-bottom: 1px solid #2a2a2a; }
  td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #1e1e1e; font-family: monospace; }
  .empty { color: #555; font-style: italic; font-size: 0.85rem; }
  .group-item { margin-bottom: 0.75rem; padding: 0.75rem; background: #111; border: 1px solid #222; border-radius: 4px; }
  .group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
  .group-name { font-weight: 600; color: #7ec8e3; font-family: monospace; }
  .group-paths { font-size: 0.82rem; color: #888; font-family: monospace; }
  .group-paths span { display: block; }
  button { cursor: pointer; border: none; border-radius: 4px; font-size: 0.82rem; padding: 0.3rem 0.7rem; }
  .btn-remove { background: #3a1a1a; color: #e07070; }
  .btn-remove:hover { background: #4a2020; }
  .btn-remove:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-pause   { background: #3a3a1a; color: #e0c870; }
  .btn-pause:hover { background: #4a4a20; }
  .btn-unpause { background: #1a2a3a; color: #70b0e0; }
  .btn-unpause:hover { background: #203a4a; }
  .btn-pause:disabled, .btn-unpause:disabled { opacity: 0.4; cursor: not-allowed; }
  .paused-badge { font-size: 0.75rem; color: #888; font-style: italic; margin-left: 0.4rem; }
  .group-file-count { font-size: 0.78rem; color: #555; font-family: monospace; margin-left: 0.5rem; }
  .group-paused .group-name { color: #888; }
  .btn-add { background: #1a3a1a; color: #70e070; padding: 0.45rem 1rem; font-size: 0.9rem; }
  .btn-add:hover { background: #204a20; }
  .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }
  .form-row { display: flex; flex-direction: column; gap: 0.5rem; }
  label { font-size: 0.82rem; color: #888; }
  input[type=text], textarea {
    background: #111; border: 1px solid #333; color: #e0e0e0;
    border-radius: 4px; padding: 0.45rem 0.6rem; font-family: monospace;
    font-size: 0.88rem; width: 100%;
  }
  input[type=text]:focus, textarea:focus { outline: none; border-color: #7ec8e3; }
  textarea { resize: vertical; min-height: 80px; }
  .error { color: #e07070; font-size: 0.85rem; margin-top: 0.5rem; }
  .refresh-info { font-size: 0.78rem; color: #444; text-align: right; margin-top: -0.5rem; margin-bottom: 1rem; }
  .log-panel {
    font-family: monospace; font-size: 0.82rem; background: #0d0d0d;
    border: 1px solid #2a2a2a; border-radius: 4px;
    overflow-y: auto; max-height: 260px;
  }
  .log-table { width: 100%; border-collapse: collapse; }
  .log-table th {
    text-align: left; color: #555; font-weight: normal;
    padding: 0.3rem 0.6rem; border-bottom: 1px solid #1e1e1e; font-size: 0.78rem;
  }
  .log-table td { padding: 0.3rem 0.6rem; color: #c0c0c0; white-space: nowrap; }
  .log-table tr:hover td { background: #161616; }
  .dir-in  { color: #7ec8e3; }
  .dir-out { color: #e3a87e; }
  .dir-del { color: #e07070; }
  .log-empty { color: #444; font-style: italic; font-size: 0.85rem; padding: 0.6rem; }
  .btn-force { background: #2a1a3a; color: #c07ee3; }
  .btn-force:hover { background: #3a2050; }
  .btn-force:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-pause-all { background: #1a2a3a; color: #70b0e0; }
  .btn-pause-all:hover { background: #203a4a; }
</style>
</head>
<body>
<h1 id="app-title">RetroSync</h1>
<div class="refresh-info" id="refresh-info">Loading...</div>

<div class="panel" id="node-panel">
  <h2>Node Info</h2>
  <div style="display:flex;gap:2rem;" id="node-kv"><span class="label">Loading...</span></div>
</div>

<div class="panel" id="peers-panel">
  <h2 id="peers-heading">Connected Peers</h2>
  <div id="peers-container"><span class="empty">Loading...</span></div>
</div>

<div class="panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
    <h2 style="margin:0;">Sync Groups</h2>
    <div style="display:flex;gap:0.4rem;" id="group-actions"></div>
  </div>
  <div id="groups-container"><span class="empty">Loading...</span></div>

  <hr style="border-color:#222;margin:1rem 0;">
  <h2 style="margin-bottom:0.75rem;">Add Group</h2>
  <div class="form-row">
    <div>
      <label for="add-name">Group name</label>
      <input type="text" id="add-name" placeholder="saves" />
    </div>
    <div>
      <label for="add-paths">Paths (one per line)</label>
      <textarea id="add-paths" placeholder="C:\RetroArch\saves[*.srm;*.sav]"></textarea>
    </div>
    <div>
      <button class="btn-add" id="add-btn" onclick="addGroup()" title="Add a new sync group to the configuration">Add Group</button>
      <div class="error" id="add-error"></div>
    </div>
  </div>
</div>

<div class="panel">
  <h2>Sync Log</h2>
  <div class="log-panel">
    <table class="log-table" id="log-table">
      <thead>
        <tr>
          <th>Time</th><th>Op</th><th>Group</th>
          <th>File</th><th>Size</th><th>Peer</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr><td colspan="6" class="log-empty">No sync events yet.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let readOnly = false;
let nodeRole = '';
let serverGroups = null; // map of groupName→paused for the server; null when not a client

async function fetchAll() {
  try {
    const [statusRes, configRes, serverConfigRes] = await Promise.all([
      fetch('/api/status'),
      fetch('/api/config'),
      fetch('/api/server/config'),
    ]);
    if (!statusRes.ok || !configRes.ok) throw new Error('fetch failed');
    const status = await statusRes.json();
    const groups = await configRes.json();
    if (serverConfigRes.ok) {
      const sg = await serverConfigRes.json();
      serverGroups = {};
      for (const g of sg) serverGroups[g.name] = g.paused;
    } else {
      serverGroups = null;
    }
    renderStatus(status);
    renderGroups(groups);
    document.getElementById('refresh-info').textContent =
      'Last updated: ' + new Date().toLocaleTimeString() + ' (auto-refresh 15s)';
  } catch (e) {
    document.getElementById('refresh-info').textContent = 'Error loading data: ' + e.message;
  }
}

function modeLabel(role) {
  if (role === 'server') return 'Server';
  if (role === 'client') return 'Client';
  return 'Peer (legacy P2P)';
}

function renderStatus(s) {
  nodeRole = s.role;
  const kv = document.getElementById('node-kv');
  kv.innerHTML = `
    <div class="kv" style="flex:1;">
      <span class="label">Name</span><span class="value">${esc(s.name || '—')}</span>
      <span class="label">Mode</span><span class="value">${esc(modeLabel(s.role))}</span>
      <span class="label">ID</span><span class="value">${esc(s.id)}</span>
      <span class="label">Uptime</span><span class="value">${esc(s.uptime || '—')}</span>
    </div>
    <div class="kv" style="flex:1;">
      <span class="label">HTTP port</span><span class="value">${s.http_port}</span>
      <span class="label">Discovery port</span><span class="value">${s.discovery_port}</span>
      <span class="label">Indexed files</span><span class="value">${s.file_count}</span>
      <span class="label">Files synced</span><span class="value">${s.total_synced}</span>
    </div>
  `;

  const verStr = s.version ? ' v' + esc(s.version) : '';
  document.getElementById('app-title').textContent = 'RetroSync' + verStr;
  document.title = 'RetroSync' + verStr + ' \u2014 ' + esc(s.name || s.id);

  const heading = document.getElementById('peers-heading');
  const container = document.getElementById('peers-container');

  if (s.role === 'server') {
    heading.textContent = 'Connected Clients';
    const peers = s.peers || [];
    if (peers.length === 0) {
      container.innerHTML = '<span class="empty">No clients connected</span>';
      return;
    }
    let html = '<table><thead><tr><th>Name</th><th>Address</th><th>Port</th></tr></thead><tbody>';
    for (const p of peers) {
      html += `<tr><td>${esc(p.name || p.id)}</td><td>${esc(p.addr)}</td><td>${p.port}</td></tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;

  } else if (s.role === 'client') {
    heading.textContent = 'Server';
    const addr = s.server_addr || '';
    const port = s.server_port || 0;
    const addrDisplay = addr ? esc(addr) + ':' + port : '<em style="color:#555">Discovering...</em>';
    container.innerHTML = `
      <div class="kv">
        <span class="label">Name</span><span class="value">${esc(s.server_name || '—')}</span>
        <span class="label">Address</span><span class="value">${addrDisplay}</span>
      </div>`;

  } else {
    // Legacy P2P
    heading.textContent = 'Connected Peers';
    const peers = s.peers || [];
    if (peers.length === 0) {
      container.innerHTML = '<span class="empty">No peers connected</span>';
      return;
    }
    let html = '<table><thead><tr><th>ID</th><th>Address</th><th>Port</th></tr></thead><tbody>';
    for (const p of peers) {
      html += `<tr><td>${esc(p.id)}</td><td>${esc(p.addr)}</td><td>${p.port}</td></tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
  }
}

function renderGroups(groups) {
  const container = document.getElementById('groups-container');

  // Populate panel header action buttons.
  const actions = document.getElementById('group-actions');
  const allPaused = groups && groups.length > 0 && groups.every(g => g.paused);
  actions.innerHTML =
    (nodeRole === 'client'
      ? `<button class="btn-force" onclick="forceSyncAll(this)" title="Download all server files and delete any local files not on the server">Force Sync All</button>`
      : '') +
    `<button class="btn-pause-all" onclick="pauseAll(${allPaused ? 'false' : 'true'})" title="${allPaused ? 'Resume automatic syncing for all groups' : 'Pause automatic syncing for all groups'}">` +
      `${allPaused ? 'Unpause All' : 'Pause All'}</button>`;

  if (!groups || groups.length === 0) {
    container.innerHTML = '<span class="empty">No sync groups configured</span>';
    return;
  }
  let html = '';
  for (const g of groups) {
    const pathsHtml = (g.paths || []).map(p => `<span>${esc(p)}</span>`).join('');
    const serverPaused = serverGroups !== null && serverGroups[g.name] === true;
    const localPaused = g.paused === true;
    const isPaused = serverPaused || localPaused;

    let pauseHtml = '';
    if (serverPaused) {
      pauseHtml = `<span class="paused-badge" title="This group has been paused on the server">paused by server</span>`;
    } else if (localPaused) {
      pauseHtml = `<button class="btn-unpause" onclick="setPause('${esc(g.name)}', false)"
        title="Resume automatic syncing for this group"
        ${readOnly ? 'disabled title="Read-only: no config file"' : ''}>Unpause</button>`;
    } else {
      pauseHtml = `<button class="btn-pause" onclick="setPause('${esc(g.name)}', true)"
        title="Pause automatic syncing for this group"
        ${readOnly ? 'disabled title="Read-only: no config file"' : ''}>Pause</button>`;
    }

    const forceBtnHtml = nodeRole === 'client'
      ? `<button class="btn-force" onclick="forceSyncGroup('${esc(g.name)}', this)" title="Download all server files and delete any local files not on the server">Force Sync</button>`
      : '';

    html += `
      <div class="group-item${isPaused ? ' group-paused' : ''}">
        <div class="group-header">
          <span class="group-name">${esc(g.name)}</span><span class="group-file-count">${g.file_count} file${g.file_count === 1 ? '' : 's'}</span>
          <div style="display:flex;gap:0.4rem;align-items:center;">
            ${forceBtnHtml}
            ${pauseHtml}
            <button class="btn-remove" onclick="removeGroup('${esc(g.name)}')"
              title="Remove this sync group from the configuration"
              ${readOnly ? 'disabled title="Read-only: no config file"' : ''}>Remove</button>
          </div>
        </div>
        <div class="group-paths">${pathsHtml}</div>
      </div>`;
  }
  container.innerHTML = html;
}

async function setPause(name, paused) {
  const res = await fetch('/api/config/groups/' + encodeURIComponent(name), {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ paused }),
  });
  if (!res.ok) { alert('Error: ' + await res.text()); return; }
  await fetchAll();
}

async function removeGroup(name) {
  if (!confirm('Remove group "' + name + '"?')) return;
  const res = await fetch('/api/config/groups/' + encodeURIComponent(name), { method: 'DELETE' });
  if (!res.ok) {
    const msg = await res.text();
    alert('Error: ' + msg);
    return;
  }
  await fetchAll();
}

async function addGroup() {
  const name = document.getElementById('add-name').value.trim();
  const rawPaths = document.getElementById('add-paths').value;
  const paths = rawPaths.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const errEl = document.getElementById('add-error');
  errEl.textContent = '';

  if (!name) { errEl.textContent = 'Group name is required.'; return; }
  if (paths.length === 0) { errEl.textContent = 'At least one path is required.'; return; }

  const res = await fetch('/api/config/groups', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, paths }),
  });
  if (!res.ok) {
    const msg = await res.text();
    errEl.textContent = 'Error: ' + msg;
    return;
  }
  document.getElementById('add-name').value = '';
  document.getElementById('add-paths').value = '';
  await fetchAll();
}

async function pauseAll(paused) {
  const res = await fetch('/api/pause-all', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ paused }),
  });
  if (!res.ok) { alert('Error: ' + await res.text()); return; }
  await fetchAll();
}

async function forceSyncGroup(name, btn) {
  btn.disabled = true;
  try {
    const res = await fetch('/api/force-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ group: name }),
    });
    if (!res.ok) { alert('Force sync failed: ' + await res.text()); }
    else { await fetchAll(); }
  } finally { btn.disabled = false; }
}

async function forceSyncAll(btn) {
  btn.disabled = true;
  try {
    const res = await fetch('/api/force-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ group: '' }),
    });
    if (!res.ok) { alert('Force sync failed: ' + await res.text()); }
    else { await fetchAll(); }
  } finally { btn.disabled = false; }
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

let logAfter = -1;

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

async function fetchLog() {
  try {
    const res = await fetch('/api/log?after=' + logAfter);
    if (!res.ok) return;
    const entries = await res.json();
    if (!entries || entries.length === 0) return;

    const tbody = document.getElementById('log-body');
    if (tbody.querySelector('.log-empty')) tbody.innerHTML = '';

    for (const e of entries) {
      const tr = document.createElement('tr');
      const ts = new Date(e.time).toLocaleTimeString();
      let dirLabel, dirClass;
      if (e.direction === 'in') {
        dirLabel = '\u2193 in';
        dirClass = 'dir-in';
      } else if (e.direction === 'out') {
        dirLabel = '\u2191 out';
        dirClass = 'dir-out';
      } else {
        dirLabel = '\u2715 del';
        dirClass = 'dir-del';
      }
      tr.innerHTML =
        '<td>' + esc(ts) + '</td>' +
        '<td class="' + dirClass + '">' + dirLabel + '</td>' +
        '<td>' + esc(e.group) + '</td>' +
        '<td>' + esc(e.filename) + '</td>' +
        '<td>' + (e.direction === 'del' ? '—' : fmtSize(e.size_bytes)) + '</td>' +
        '<td>' + esc(e.peer) + '</td>';
      tbody.appendChild(tr);
      if (e.index > logAfter) logAfter = e.index;
    }

    while (tbody.rows.length > 10) tbody.deleteRow(0);
  } catch (_) {}
}

fetchAll();
fetchLog();
setInterval(fetchAll, 15000);
setInterval(fetchLog, 5000);
</script>
</body>
</html>
